{% load static %}
<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastre viticole - Valais</title>
    <link rel="stylesheet" href="{% static 'style.css' %}" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }
      #map {
        height: 100vh;
        width: 100%;
      }
      .legend {
        background: white;
        padding: 15px;
        border-radius: 5px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        font-size: 14px;
        line-height: 1.5;
      }
      .legend h3 {
        margin: 0 0 10px 0;
        font-size: 16px;
      }
      .legend-item {
        display: flex;
        align-items: center;
        margin-bottom: 8px;
      }
      .legend-color {
        width: 20px;
        height: 20px;
        margin-right: 10px;
        border: 1px solid #333;
        border-radius: 3px;
      }
      .legend-label {
        flex: 1;
      }
      .info-panel {
        background: white;
        padding: 10px 15px;
        border-radius: 5px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        font-size: 13px;
      }
      .loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 20px 40px;
        border-radius: 5px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="loading" class="loading" style="display: none">
      <p>Chargement des parcelles...</p>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
      // Initialize map
      const map = L.map("map").setView([46.3, 7.8], 10);
      let parcellsLayer = null;

      // Add OpenStreetMap tiles
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap",
        maxZoom: 19,
      }).addTo(map);

      // Create legend
      const legend = L.control({ position: "topright" });

      legend.onAdd = function (map) {
        const div = L.DomUtil.create("div", "legend");
        div.innerHTML = `
          <h3>Priorité d'arrachage</h3>
          <div class="legend-item">
            <div class="legend-color" style="background-color: #d73027;"></div>
            <div class="legend-label">Haute (> 75%)</div>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background-color: #fc8d59;"></div>
            <div class="legend-label">Moyenne (50-75%)</div>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background-color: #fee08b;"></div>
            <div class="legend-label">Basse (25-50%)</div>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background-color: #1a9850;"></div>
            <div class="legend-label">Très Basse (< 25%)</div>
          </div>
          <hr style="margin: 10px 0; border: none; border-top: 1px solid #ccc;">
          <div style="font-size: 12px; margin-top: 10px; color: #666;">
            <strong>Méthode AHP:</strong><br>
            Pente: 40%<br>
            Distance route: 30%<br>
            Surface: 30%
          </div>
        `;
        return div;
      };

      legend.addTo(map);

      // Color function based on AHP score
      function scoreToColor(score) {
        if (score > 0.75) return "#d73027"; // red - high priority
        if (score > 0.5) return "#fc8d59"; // orange
        if (score > 0.25) return "#fee08b"; // yellow
        return "#1a9850"; // green - low priority
      }

      // Load parcelles
      const loadingDiv = document.getElementById("loading");
      loadingDiv.style.display = "block";

      fetch("/api/parcelles/")
        .then((res) => {
          if (!res.ok) {
            throw new Error("Erreur lors du chargement: " + res.statusText);
          }
          return res.json();
        })
        .then((data) => {
          console.log("Parcelles loaded:", data.features.length, "features");

          if (!data.features || data.features.length === 0) {
            alert("Aucune parcelle trouvée dans le fichier de données.");
            loadingDiv.style.display = "none";
            return;
          }

          // Create GeoJSON layer
          parcellsLayer = L.geoJSON(data, {
            style: (feature) => ({
              color: "#333",
              weight: 1.5,
              opacity: 0.8,
              fillColor: scoreToColor(feature.properties.ahp_score || 0.5),
              fillOpacity: 0.7,
            }),
            pointToLayer: (feature, latlng) => {
              return L.circleMarker(latlng, {
                radius: 8,
                fillColor: scoreToColor(feature.properties.ahp_score || 0.5),
                color: "#333",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8,
              });
            },
            onEachFeature: (feature, layer) => {
              const props = feature.properties;
              const area = props.surface
                ? (props.surface / 10000).toFixed(2)
                : "N/A";
              const score = props.ahp_score
                ? (props.ahp_score * 100).toFixed(1)
                : "N/A";
              const priority = props.priority || "N/A";
              const distance =
                props.distance_route || props.distance_r || "N/A";

              const popupContent = `
                <div style="width: 250px;">
                  <h4 style="margin: 0 0 10px 0;">Parcelle #${props.id || "N/A"}</h4>
                  <table style="width: 100%; font-size: 13px; border-collapse: collapse;">
                    <tr>
                      <td style="padding: 5px; font-weight: bold;">Surface:</td>
                      <td style="padding: 5px; text-align: right;">${area} ha</td>
                    </tr>
                    <tr style="background-color: #f5f5f5;">
                      <td style="padding: 5px; font-weight: bold;">Pente:</td>
                      <td style="padding: 5px; text-align: right;">${props.pente || "N/A"}°</td>
                    </tr>
                    <tr>
                      <td style="padding: 5px; font-weight: bold;">Distance route:</td>
                      <td style="padding: 5px; text-align: right;">${distance} m</td>
                    </tr>
                    <tr style="background-color: #f5f5f5; font-weight: bold;">
                      <td style="padding: 5px;">Score AHP:</td>
                      <td style="padding: 5px; text-align: right; color: ${scoreToColor(props.ahp_score || 0.5)};">${score}%</td>
                    </tr>
                    <tr>
                      <td style="padding: 5px; font-weight: bold;">Priorité:</td>
                      <td style="padding: 5px; text-align: right;">${priority}</td>
                    </tr>
                  </table>
                </div>
              `;

              layer.bindPopup(popupContent);

              // Show popup on hover for better UX
              layer.on("mouseover", function () {
                this.openPopup();
              });
              layer.on("mouseout", function () {
                this.closePopup();
              });
            },
          }).addTo(map);

          // Fit map to bounds of parcelles
          if (parcellsLayer && parcellsLayer.getBounds().isValid()) {
            map.fitBounds(parcellsLayer.getBounds(), { padding: [50, 50] });
          }

          loadingDiv.style.display = "none";
        })
        .catch((error) => {
          console.error("Error loading parcelles:", error);
          loadingDiv.style.display = "none";
          alert("Erreur: " + error.message);
        });
    </script>
  </body>
</html>
